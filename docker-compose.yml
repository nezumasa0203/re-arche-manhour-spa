# ============================================
# CZ マイグレーション 開発環境
# docker compose up で workspace + 全サービス起動
# 7サービス構成: workspace / frontend / backend / batch / auth-mock / db / redis
# ============================================

services:
  # ------------------------------------------
  # Workspace — 開発用統合コンテナ
  # Node.js + Python + Java + Gradle + uv + spec-kit
  # VSCode DevContainer からアタッチして使用
  # ------------------------------------------
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: cz-migration-workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity

  # ------------------------------------------
  # Database — PostgreSQL 16 (Oracle から移行)
  # ------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: cz-migration-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cz_migration_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cz_migration_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Redis — パラメータキャッシュ
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cz-migration-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Backend — Spring Boot 3 REST API
  # ------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: cz-migration-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-cz_migration_dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DEV_AUTH_ENABLED: "true"
      AUTH_MOCK_BASE_URL: http://auth-mock:8180
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_PORT:-3000}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ------------------------------------------
  # Batch — Spring Batch 5 (オンデマンド実行)
  # ------------------------------------------
  batch:
    build:
      context: ./batch
      dockerfile: Dockerfile
      target: dev
    container_name: cz-migration-batch
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-cz_migration_dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    volumes:
      - ./batch:/app
      - gradle_cache:/home/gradle/.gradle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - batch

  # ------------------------------------------
  # Auth Mock — Express ALB+Okta OIDC 模倣サーバー
  # ------------------------------------------
  auth-mock:
    build:
      context: ./auth-mock
      dockerfile: Dockerfile
    container_name: cz-migration-auth-mock
    environment:
      PORT: 8180
      JWT_SECRET: ${JWT_SECRET:-dev-mock-secret-key-that-is-at-least-256-bits-long}
      JWT_ISSUER: ${JWT_ISSUER:-https://mock-okta.example.com}
    ports:
      - "${AUTH_MOCK_PORT:-8180}:8180"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8180/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Frontend — Nuxt.js 3 SPA (HMR 対応)
  # ------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: cz-migration-frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:8080
      NUXT_PUBLIC_AUTH_MOCK_BASE: http://localhost:${AUTH_MOCK_PORT:-8180}
      NUXT_PUBLIC_ENABLE_ACTOR_SWITCH: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    name: cz-migration-postgres-data
  redis_data:
    name: cz-migration-redis-data
  frontend_node_modules:
    name: cz-migration-frontend-node-modules
  gradle_cache:
    name: cz-migration-gradle-cache

name: CI Production

on:
  push:
    branches: [main, release/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 本番ビルド安全性検査
  # ENABLE_ACTOR_SWITCH 未設定で dev 機能が無効なことを確認
  # ============================================
  safety-check:
    name: Production Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (ENABLE_ACTOR_SWITCH unset)
        run: npm run build
        env:
          NUXT_PUBLIC_ENABLE_ACTOR_SWITCH: ""

      - name: "CRITICAL: Verify no actor-switch in production build"
        run: |
          if grep -rl "ActorSwitch\|actor-switch\|ENABLE_ACTOR_SWITCH\|DevActorSwitcher" \
            .output/ 2>/dev/null; then
            echo "::error::FATAL: Actor switch code found in production build!"
            exit 1
          fi
          echo "✓ No actor-switch code in production build"

      - name: "CRITICAL: Verify no mock-auth in backend"
        working-directory: ${{ github.workspace }}
        run: |
          if grep -rl "mock-auth\|MockAuthFilter\|actor-switch" \
            backend/src/main/ --include="*.java" 2>/dev/null | \
            grep -v "test\|Test" | head -5; then
            echo "::error::FATAL: Mock auth code found in production backend!"
            exit 1
          fi
          echo "✓ No mock-auth code in backend production sources"

  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests with H2
        run: gradle test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Production build (ENABLE_ACTOR_SWITCH unset)
        run: npm run build
        env:
          NUXT_PUBLIC_ENABLE_ACTOR_SWITCH: ""

  batch-test:
    name: Batch Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: batch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests with H2
        run: gradle test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

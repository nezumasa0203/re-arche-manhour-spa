# CZ メッセージカタログ
# コードレンジ:
#   CZ-000〜099: 成功メッセージ
#   CZ-100〜299: 警告メッセージ（バリデーション・ビジネスルール）
#   CZ-300〜499: システムエラー
#   CZ-500〜799: 確認ダイアログ
#   CZ-800〜999: 情報メッセージ

cz:
  messages:

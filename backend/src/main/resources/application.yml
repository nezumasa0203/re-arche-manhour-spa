spring:
  application:
    name: cz-migration

  # --- データソース ---
  datasource:
    url: jdbc:postgresql://localhost:5432/cz_migration_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

# --- JWT / Auth ---
app:
  jwt:
    secret: ${JWT_SECRET:dev-mock-secret-key-that-is-at-least-256-bits-long}

# --- Doma 2 ---
doma:
  dialect: postgres
  sql-file-repository: greedy-cache

# ============================================
# Actuator (全プロファイル共通)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
# Dev プロファイル
spring:
  config:
    activate:
      on-profile: dev

  devtools:
    restart:
      enabled: true

app:
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:dev-mock-secret-key-that-is-at-least-256-bits-long}
  service-time:
    enabled: false

---
# Test プロファイル
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver

doma:
  dialect: h2

---
# Prod プロファイル
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
